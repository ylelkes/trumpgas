name: Update Data Daily

on:
  schedule:
    - cron: '30 14 * * *'   # 14:30 UTC = ~9:30 AM ET, after EIA weekly update
  workflow_dispatch:         # allow manual runs from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit updated data files

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest data
        env:
          # Register free at https://www.eia.gov/opendata/register.php
          # then add EIA_API_KEY as a repository secret.
          # Falls back to DEMO_KEY (rate-limited) if secret is absent.
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python fetch_data.py

      - name: Commit data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: update data $(date -u +%Y-%m-%d)"
            git push
          fi
